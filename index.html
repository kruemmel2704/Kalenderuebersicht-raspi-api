<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wochenplan</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#102a4e">
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="apple-touch-icon" href="/static/logo.png">
    <!-- Modern, premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #102a4e;
            --text-color: #ffffff;
            --card-bg: #1a365d;
            --accent: #007bb5;
            --accent-hover: #005a87;
            --border: #2a4365;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 2rem;
            padding-bottom: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .container {
            max-width: 95vw;
            width: 100%;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-height: 0;
            position: relative;
        }

        .header-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .logo {
            height: 65px;
            width: auto;
            object-fit: contain;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            color: var(--text-color);
            font-weight: 700;
            margin: 0;
        }

        .date-display {
            text-align: center;
            color: #94a3b8;
            font-size: 1.25rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .status {
            text-align: center;
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background-color: rgba(30, 41, 59, 0.5);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid var(--border);
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }

        .events-viewport {
            width: 100%;
            flex-grow: 1;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none;  /* IE and Edge */
            min-height: 0;
            position: relative;
            padding-bottom: 1rem;
        }

        .events-viewport::-webkit-scrollbar {
            display: none; /* Chrome, Safari and Opera */
        }

        .events-list {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            width: 100%;
        }

        .expand-action-container {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
        }

        .expand-action-container.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .scroll-more-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .scroll-more-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.6);
        }

        .day-column {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .day-column.past-day {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        .day-header {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-top: 0;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            background-color: var(--bg-color);
            z-index: 10;
            word-wrap: break-word;
        }

        .day-header.past-day {
            color: #64748b;
            border-bottom-color: #475569;
        }

        .event-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 0.75rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .event-card.has-description {
            cursor: pointer;
        }

        .event-description {
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px dashed var(--border);
            font-size: 0.9rem;
            color: #cbd5e1;
            white-space: pre-wrap;
            display: none;
            word-wrap: break-word;
            width: 100%;
        }

        .event-card.expanded .event-description {
            display: block;
        }

        .event-card.past-day {
            opacity: 0.6;
            filter: grayscale(0.5);
        }

        /* Subtle glow effect on hover */
        .event-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, #1a365d, #007bb5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .event-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(0, 0, 0, 0.3);
            border-color: #475569;
            opacity: 1;
            filter: grayscale(0);
        }

        .event-card:hover::before {
            opacity: 1;
        }

        .event-time {
            font-weight: 600;
            color: #60a5fa;
            font-size: 1rem;
            min-width: 75px;
            flex-shrink: 0;
            margin-top: 0.15rem;
        }

        .past-day .event-time {
            color: #94a3b8;
        }

        .event-details {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 0;
        }

        .event-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: #e2e8f0;
            word-wrap: break-word;
            line-height: 1.3;
        }

        .event-assignee {
            font-size: 0.9rem;
            color: #94a3b8;
            font-weight: 400;
        }

        .event-location {
            font-size: 0.85rem;
            color: #94a3b8;
            display: flex;
            align-items: flex-start;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .event-location svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
            flex-shrink: 0;
            margin-top: 0.15rem;
        }

        .travel-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 0.1rem 0.4rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(16, 185, 129, 0.3);
            white-space: nowrap;
        }

        .walk-badge {
            background-color: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border-color: rgba(59, 130, 246, 0.3);
        }

        .no-events {
            text-align: center;
            padding: 4rem 2rem;
            background-color: var(--card-bg);
            border-radius: 16px;
            color: #94a3b8;
            font-size: 1.1rem;
            border: 1px dashed var(--border);
            margin-top: 1rem;
        }

        .current-time-indicator {
            position: fixed;
            top: 1rem;
            right: 1rem;
            font-size: 1.2rem;
            font-weight: 600;
            color: #cbd5e1;
            background: var(--card-bg);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .birthday-banner {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            color: #fbbf24;
            margin-bottom: 1.5rem;
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% {
                text-shadow: 0 0 5px rgba(251, 191, 36, 0.4);
            }

            50% {
                text-shadow: 0 0 20px rgba(251, 191, 36, 0.8);
            }

            100% {
                text-shadow: 0 0 5px rgba(251, 191, 36, 0.4);
            }
        }

        .week-birthdays {
            text-align: center;
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
            background-color: var(--card-bg);
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            border: 1px solid var(--border);
            display: inline-block;
        }

        .hidden {
            display: none !important;
        }

        .spotify-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border);
            padding: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(100%);
            max-height: 80px;
            overflow: hidden;
        }

        .spotify-footer.visible {
            transform: translateY(0);
        }

        .spotify-footer.expanded {
            max-height: 90vh;
        }

        .footer-main-row {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            min-height: 80px;
            width: 100%;
            box-sizing: border-box;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        .expanded .footer-main-row {
            border-color: var(--border);
        }

        .spotify-art {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        .spotify-info {
            display: flex;
            flex-direction: column;
        }

        .spotify-track {
            font-weight: 600;
            color: #e2e8f0;
            font-size: 1.1rem;
        }

        .spotify-artist {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .spotify-logo {
            width: 32px;
            height: 32px;
            margin-right: 1.5rem;
            fill: #1DB954;
            /* Spotify green */
        }

        .spotify-auth-btn {
            background-color: #1DB954;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background-color 0.2s;
        }

        .spotify-auth-btn:hover {
            background-color: #1ed760;
        }

        .spotify-controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-left: auto;
        }

        .skip-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .skip-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .skip-icon {
            width: 24px;
            height: 24px;
            fill: #e2e8f0;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .volume-icon {
            width: 20px;
            height: 20px;
            fill: #94a3b8;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: #475569;
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        .playlists-panel {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            background-color: rgba(15, 23, 42, 0.3);
        }

        .playlists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            overflow-y: auto;
            padding: 1rem 0;
            margin-top: 1.5rem;
        }

        .playlist-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .playlist-card:hover {
            border-color: #1DB954;
            transform: translateY(-4px);
        }

        .playlist-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .playlist-name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-owner {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        /* Floating Action Button (FAB) */
        .spotify-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 900;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .spotify-fab:hover {
            transform: translateY(-4px) scale(1.05);
            border-color: #1DB954;
            box-shadow: 0 15px 30px -5px rgba(29, 185, 84, 0.3);
        }

        .spotify-fab.hidden {
            transform: scale(0);
            opacity: 0;
            pointer-events: none;
        }

        .spotify-logo-fab {
            width: 32px;
            height: 32px;
            fill: #1DB954;
        }

        /* Event Modal Styles */
        .event-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .event-modal-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .event-modal {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .event-modal-overlay.visible .event-modal {
            transform: translateY(0);
        }

        .event-modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: sticky;
            top: 0;
            background-color: var(--card-bg);
            z-index: 10;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .event-modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e2e8f0;
            margin: 0;
            line-height: 1.3;
        }

        .event-modal-close {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .event-modal-close:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        .event-modal-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .modal-info-row {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .modal-info-icon {
            width: 20px;
            height: 20px;
            fill: #60a5fa;
            flex-shrink: 0;
            margin-top: 0.15rem;
        }

        .modal-info-text {
            color: #cbd5e1;
            font-size: 1rem;
            line-height: 1.5;
        }

        .modal-description {
            background-color: rgba(15, 23, 42, 0.4);
            border-radius: 8px;
            padding: 1rem;
            color: #e2e8f0;
            white-space: pre-wrap;
            font-size: 0.95rem;
            border: 1px dashed var(--border);
            margin-top: 0.5rem;
        }

        .modal-map-container {
            margin-top: 1rem;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background-color: rgba(15, 23, 42, 0.4);
        }
        
        .modal-map-header {
            padding: 0.75rem 1rem;
            background-color: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-map-iframe {
            width: 100%;
            height: 300px;
            border: 0;
            display: block;
        }
    </style>
</head>

<body>
    <div class="current-time-indicator" id="clock">00:00:00</div>

    <div class="container">
        <div class="header-area">
            <img src="/static/logo.svg" alt="CPM Logo" class="logo"
                onerror="this.style.display='none'">
            <h1>Wochenplan</h1>
        </div>

        <div id="today-birthday-banner" class="birthday-banner hidden"></div>

        <div style="text-align: center;">
            <div id="week-birthdays-container" class="week-birthdays hidden"></div>
        </div>

        <div class="date-display" id="current-date">Lade Datum...</div>

        <div class="status">
            <div class="pulse"></div>
            <span>Live Sync <span id="last-update"></span></span>
        </div>

        <div class="events-viewport" id="events-viewport">
            <div class="events-list" id="events-container">
                <div class="no-events">Lade Termine...</div>
            </div>
        </div>

        <div class="expand-action-container" id="expand-action-container">
            <button class="scroll-more-btn" id="scroll-more-btn" onclick="toggleScrollEvents()">
                <span>Weitere Termine zeigen</span>
            </button>
        </div>
    </div>

    <div id="spotify-footer" class="spotify-footer">
        <div class="footer-main-row">
            <svg class="spotify-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.56.3z" />
            </svg>

            <div id="spotify-auth-container" style="display: none;">
                <a id="spotify-auth-link" href="/login" class="spotify-auth-btn" target="_blank">Mit Spotify verknüpfen</a>
            </div>

            <div id="spotify-play-container" style="display: none; align-items: center; gap: 1rem; flex-grow: 1;">
                <img id="spotify-art" src="" alt="Album Art" class="spotify-art">
                <div class="spotify-info">
                    <div id="spotify-track" class="spotify-track"></div>
                    <div id="spotify-artist" class="spotify-artist"></div>
                </div>

                <div class="spotify-controls">
                    <button class="skip-btn" onclick="togglePlaylists()" title="Playlists durchsuchen">
                        <svg class="skip-icon" id="playlist-toggle-icon" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M3 10h11v2H3v-2zm0-4h11v2H3V6zm0 8h7v2H3v-2zm13-8v8h-2V6h2zm2-2c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2h13zM5 18h14V6H5v12z" />
                        </svg>
                    </button>
                    <button class="skip-btn" onclick="prevSpotify()" title="Vorheriger Titel">
                        <svg class="skip-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                        </svg>
                    </button>
                    <button class="skip-btn" onclick="togglePlaySpotify()" title="Play/Pause">
                        <svg class="skip-icon" id="play-pause-icon" viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M8 5v14l11-7z" /> <!-- Default Play -->
                        </svg>
                    </button>
                    <button class="skip-btn" onclick="skipSpotify()" title="Nächster Titel">
                        <svg class="skip-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                        </svg>
                    </button>
                    <div class="volume-container">
                        <svg class="volume-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                        </svg>
                        <input type="range" id="spotify-volume" class="volume-slider" min="0" max="100" value="50"
                            onchange="changeSpotifyVolume(this.value)">
                    </div>
                </div>
            </div>
        </div>

        <div id="playlists-panel" class="playlists-panel">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
                <h2 style="margin: 0; color: #1DB954;">Spotify Playlists</h2>
                <button class="skip-btn" onclick="togglePlaylists()" title="Schließen">
                    <svg class="skip-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                    </svg>
                </button>
            </div>
            <div style="display: flex; gap: 1rem;">
                <input type="text" id="playlist-search"
                    style="flex-grow: 1; padding: 0.75rem 1.5rem; border-radius: 999px; border: 1px solid var(--border); background: var(--card-bg); color: white; font-size: 1rem; outline: none;"
                    placeholder="Nach Playlists suchen..." onkeypress="if(event.key === 'Enter') searchPlaylists()">
                <button onclick="searchPlaylists()"
                    style="padding: 0 1.5rem; background: #1DB954; color: black; border: none; border-radius: 999px; cursor: pointer; font-weight: bold;">Suchen</button>
            </div>
            <div class="playlists-grid" id="playlists-grid">
                <div style="grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 2rem;">Lade Playlists...
                </div>
            </div>
        </div>
    </div>


    <!-- Event Modal -->
    <div id="event-modal-overlay" class="event-modal-overlay" onclick="closeEventModal(event)">
        <div class="event-modal" onclick="event.stopPropagation()">
            <div class="event-modal-header">
                <h2 id="modal-title" class="event-modal-title">Termin Details</h2>
                <button class="event-modal-close" onclick="closeEventModal()">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="event-modal-body" id="modal-body">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button id="spotify-fab" class="spotify-fab hidden" onclick="openPlaylistsModal()" title="Spotify Playlists öffnen">
        <svg class="spotify-logo-fab" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
                d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.84.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.56.3z" />
        </svg>
    </button>

    <script src="/static/config.js"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script>
        let isStartingPlayback = false;
        let scrollInactivityTimer = null;
        let isEventsScrolledDown = false;
        let allEventsMap = new Map();
        let currentMapsApiKey = null;

        function checkOverflow() {
            const viewport = document.getElementById('events-viewport');
            const actionContainer = document.getElementById('expand-action-container');
            if (!viewport || !actionContainer) return;
            
            if (viewport.scrollHeight > viewport.clientHeight + 20 && !isEventsScrolledDown) {
                actionContainer.classList.add('visible');
            } else {
                if (!isEventsScrolledDown) {
                    actionContainer.classList.remove('visible');
                }
            }
        }

        function toggleScrollEvents() {
            const viewport = document.getElementById('events-viewport');
            const btnSpan = document.getElementById('scroll-more-btn').querySelector('span');
            
            if (!isEventsScrolledDown) {
                viewport.scrollTo({ top: viewport.scrollHeight, behavior: 'smooth' });
                isEventsScrolledDown = true;
                if(btnSpan) btnSpan.textContent = 'Zurück zu den nächsten Terminen';
                resetScrollInactivityTimer();
            } else {
                viewport.scrollTo({ top: 0, behavior: 'smooth' });
                isEventsScrolledDown = false;
                if(btnSpan) btnSpan.textContent = 'Weitere Termine zeigen';
                clearTimeout(scrollInactivityTimer);
                checkOverflow();
            }
        }

        function resetScrollInactivityTimer() {
            if (!isEventsScrolledDown) return;
            
            clearTimeout(scrollInactivityTimer);
            scrollInactivityTimer = setTimeout(() => {
                const viewport = document.getElementById('events-viewport');
                if (viewport) {
                    viewport.scrollTo({ top: 0, behavior: 'smooth' });
                }
                isEventsScrolledDown = false;
                const btnSpan = document.getElementById('scroll-more-btn')?.querySelector('span');
                if (btnSpan) btnSpan.textContent = 'Weitere Termine zeigen';
                checkOverflow();
            }, 15000); // 15 seconds
        }

        document.addEventListener('DOMContentLoaded', () => {
            const authLink = document.getElementById('spotify-auth-link');
            if (authLink) {
                authLink.href = (window.API_ENDPOINT || "") + '/login';
            }
            const viewport = document.getElementById('events-viewport');
            if (viewport) {
                viewport.addEventListener('scroll', () => {
                    const btnSpan = document.getElementById('scroll-more-btn')?.querySelector('span');
                    if (viewport.scrollTop > 50) {
                        isEventsScrolledDown = true;
                        if (btnSpan) btnSpan.textContent = 'Zurück zu den nächsten Terminen';
                        document.getElementById('expand-action-container').classList.add('visible');
                        resetScrollInactivityTimer();
                    } else {
                        isEventsScrolledDown = false;
                        if (btnSpan) btnSpan.textContent = 'Weitere Termine zeigen';
                        clearTimeout(scrollInactivityTimer);
                        checkOverflow();
                    }
                });
            }
            
            ['mousemove', 'mousedown', 'keypress', 'touchmove'].forEach(evt => {
                document.addEventListener(evt, () => {
                    if (isEventsScrolledDown) resetScrollInactivityTimer();
                }, {passive: true});
            });
            
            window.addEventListener('resize', checkOverflow);
        });

        window.onSpotifyWebPlaybackSDKReady = () => {
            spotifyPlayer = new Spotify.Player({
                name: 'Kalender Web Player',
                getOAuthToken: cb => {
                    fetch((window.API_ENDPOINT || "") + '/api/spotify/token')
                        .then(res => res.json())
                        .then(data => {
                            if (data.token) {
                                cb(data.token);
                            }
                        })
                        .catch(err => console.error("Error fetching token:", err));
                },
                volume: 0.5
            });

            spotifyPlayer.addListener('ready', ({ device_id }) => {
                console.log('Ready with Device ID', device_id);
                localDeviceId = device_id;
            });

            spotifyPlayer.addListener('not_ready', ({ device_id }) => {
                console.log('Device ID has gone offline', device_id);
                localDeviceId = null;
            });

            // Error Listeners
            spotifyPlayer.addListener('initialization_error', ({ message }) => { console.error('Init Error:', message); });
            spotifyPlayer.addListener('authentication_error', ({ message }) => { console.error('Auth Error:', message); });
            spotifyPlayer.addListener('account_error', ({ message }) => { console.error('Account Error:', message); });
            spotifyPlayer.addListener('playback_error', ({ message }) => { console.error('Playback Error:', message); });

            spotifyPlayer.addListener('player_state_changed', state => {
                if (!state) return;

                const currentTrack = state.track_window.current_track;
                if (currentTrack) {
                    isStartingPlayback = false; // Reset loading state

                    const trackName = currentTrack.name;
                    const artistName = currentTrack.artists.map(a => a.name).join(', ');
                    const albumArt = currentTrack.album.images[0].url;
                    const isPlaying = !state.paused;

                    updateSpotifyUI({
                        track: trackName,
                        artist: artistName,
                        image: albumArt,
                        is_playing: isPlaying,
                        volume: null // Volume not in state object usually
                    });
                }
            });

            spotifyPlayer.connect();
        };
        // Update live clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Set current date
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').textContent = "Heute ist " + new Date().toLocaleDateString('de-DE', options);

        function updateEvents() {
            fetch((window.API_ENDPOINT || "") + '/api/events')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('events-container');

                    if (data.last_update) {
                        document.getElementById('last-update').textContent = `(Letztes Update: ${data.last_update})`;
                    }

                    if (data.maps_api_key) {
                        currentMapsApiKey = data.maps_api_key;
                    }
                    allEventsMap.clear();

                    // Handle today's birthday banner
                    const todayBanner = document.getElementById('today-birthday-banner');
                    if (data.today_birthdays && data.today_birthdays.length > 0) {
                        const names = data.today_birthdays.join(' & ');
                        todayBanner.textContent = `✨ Das heutige Geburtstagskind ist ${names}! ✨`;
                        todayBanner.classList.remove('hidden');
                    } else {
                        todayBanner.classList.add('hidden');
                    }

                    // Handle week birthdays
                    const weekBdayContainer = document.getElementById('week-birthdays-container');
                    if (data.week_birthdays && data.week_birthdays.length > 0) {
                        const bdayList = data.week_birthdays.map(b => `${b.name} (${b.day_name}, ${b.date_str})`).join(' • ');
                        weekBdayContainer.textContent = `🎂 Geburtstage diese Woche: ${bdayList}`;
                        weekBdayContainer.classList.remove('hidden');
                    } else {
                        weekBdayContainer.classList.add('hidden');
                    }

                    // Generate the next 5 days
                    const days = [];
                    const today = new Date();
                    const dayNames = ["Sonntag", "Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag"];

                    for (let i = 0; i < 5; i++) {
                        const d = new Date(today);
                        d.setDate(d.getDate() + i);

                        const dateStr = `${String(d.getDate()).padStart(2, '0')}.${String(d.getMonth() + 1).padStart(2, '0')}.`;
                        let displayName = dayNames[d.getDay()];

                        if (i === 0) {
                            displayName = "Heute";
                        } else if (i === 1) {
                            displayName = "Morgen";
                        }

                        days.push({
                            dateStr: dateStr,
                            displayName: displayName,
                            events: []
                        });
                    }

                    // Group events by date_str
                    if (data.events && data.events.length > 0) {
                        data.events.forEach(event => {
                            const dayIndex = days.findIndex(d => d.dateStr === event.date_str);
                            if (dayIndex !== -1) {
                                days[dayIndex].events.push(event);
                            }
                        });
                    }

                    let html = '';

                    days.forEach(day => {
                        html += `<div class="day-column">`;
                        html += `<div class="day-header">${day.displayName}, ${day.dateStr}</div>`;

                        if (day.events.length === 0) {
                            html += `
                                <div class="event-card" style="justify-content: center; opacity: 0.7; border: 1px dashed var(--border);">
                                    <div class="event-details" style="align-items: center; text-align: center;">
                                        <div class="event-title" style="color: #94a3b8; font-size: 1rem;">Keine Termine</div>
                                    </div>
                                </div>
                            `;
                        } else {
                            day.events.forEach(event => {
                                const cardClass = 'event-card';

                                let assigneeHtml = '';
                                if (event.assignee) {
                                    assigneeHtml = `<div class="event-assignee">wird erledigt von: ${event.assignee}</div>`;
                                }

                                let travelHtml = '';
                                if (event.travel_time) {
                                    if (event.travel_time.driving) {
                                        travelHtml += `<span class="travel-badge" title="Fahrtzeit inkl. Verkehr ab Boppstraße 28, Mainz">🚗 ${event.travel_time.driving}</span>`;
                                    }
                                    if (event.travel_time.walking) {
                                        travelHtml += `<span class="travel-badge walk-badge" title="Fußweg ab Boppstraße 28, Mainz">🚶 ${event.travel_time.walking}</span>`;
                                    }
                                }

                                let locationHtml = '';
                                if (event.location) {
                                    locationHtml = `
                                        <div class="event-location" title="${event.location}">
                                            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                            <span style="flex: 1; min-width: 0; word-wrap: break-word;">${event.location}</span>
                                        </div>
                                    `;
                                }

                                let descriptionHtml = '';
                                if (event.description) {
                                    descriptionHtml = `<div class="event-description">${event.description.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>`;
                                }

                                let phoneHtml = '';
                                const textToSearch = (event.description || '') + ' ' + (event.summary || '');
                                const phoneRegex = /(?:(?:\+|00)\d{1,3}[\s\-\/]?|0)[1-9](?:[\s\-\/]?\d){5,14}/g;
                                const matches = textToSearch.match(phoneRegex);
                                if (matches) {
                                    const uniquePhones = new Map();
                                    matches.forEach(m => {
                                        if (/^\d{2}[\/\-]\d{2}[\/\-]\d{2,4}$/.test(m.trim())) return;
                                        const cleanNum = m.replace(/[^\d+]/g, '');
                                        if (cleanNum.length >= 6 && !uniquePhones.has(cleanNum)) {
                                            uniquePhones.set(cleanNum, m.trim());
                                        }
                                    });
                                    if (uniquePhones.size > 0) {
                                        uniquePhones.forEach((formatted, clean) => {
                                            phoneHtml += `
                                                <div class="event-location" title="Anrufen: ${formatted}">
                                                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                                                    <a href="tel:${clean}" style="color: #60a5fa; text-decoration: none; flex: 1; margin-top: 0.15rem;" onclick="event.stopPropagation();" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${formatted}</a>
                                                </div>
                                            `;
                                        });
                                    }
                                }

                                const eventId = `evt_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                                allEventsMap.set(eventId, event);
                                const hasDescClass = 'has-description';
                                const onClickAttr = `onclick="openEventModal('${eventId}')"`;

                                html += `
                                    <div class="${cardClass} ${hasDescClass}" ${onClickAttr}>
                                        <div style="display: flex; flex-direction: column; gap: 0.4rem; flex-shrink: 0; min-width: 75px; align-items: flex-start;">
                                            <div class="event-time" style="min-width: auto; margin-top: 0;">${event.time_str}</div>
                                            ${travelHtml}
                                        </div>
                                        <div class="event-details">
                                            <div class="event-title">${event.summary}</div>
                                            ${locationHtml}
                                            ${phoneHtml}
                                            ${assigneeHtml}
                                            ${descriptionHtml}
                                        </div>
                                    </div>
                                `;
                            });
                        }

                        html += `</div>`; // Close day-column
                    });

                    // Only update DOM if HTML changed to prevent flickering
                    if (container.dataset.lastHtml !== html) {
                        const updateDOM = () => {
                            container.innerHTML = html;
                            container.dataset.lastHtml = html;
                            setTimeout(checkOverflow, 100);
                        };

                        if (document.startViewTransition) {
                            document.startViewTransition(updateDOM);
                        } else {
                            updateDOM();
                        }
                    } else {
                        checkOverflow();
                    }
                })
                .catch(error => {
                    console.error('Fehler beim Abrufen der Termine:', error);
                });
        }

        function openEventModal(eventId) {
            const event = allEventsMap.get(eventId);
            if (!event) return;

            document.getElementById('modal-title').textContent = event.summary || 'Termin';
            
            let html = '';
            
            // Time & Date
            html += `
                <div class="modal-info-row">
                    <svg class="modal-info-icon" viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    <div class="modal-info-text">
                        <strong>${event.day_name}, ${event.date_str}</strong><br>
                        ${event.time_str}
                    </div>
                </div>
            `;

            // Location
            if (event.location) {
                html += `
                    <div class="modal-info-row">
                        <svg class="modal-info-icon" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                        <div class="modal-info-text">${event.location}</div>
                    </div>
                `;
            }

            // Assignee
            if (event.assignee) {
                html += `
                    <div class="modal-info-row">
                        <svg class="modal-info-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        <div class="modal-info-text">Wird erledigt von: <strong>${event.assignee}</strong></div>
                    </div>
                `;
            }

            // Description
            if (event.description) {
                html += `
                    <div class="modal-info-row" style="flex-direction: column; gap: 0.5rem; margin-top: 0.5rem;">
                        <div style="font-weight: 600; color: #94a3b8; font-size: 0.9rem;">BESCHREIBUNG</div>
                        <div class="modal-description">${event.description.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                    </div>
                `;
            }

            // Route / Map
            if (event.location && currentMapsApiKey) {
                const encodedDest = encodeURIComponent(event.location);
                const encodedOrigin = encodeURIComponent("Boppstraße 28, 55118 Mainz");
                let travelHtml = '';
                if (event.travel_time) {
                    if (event.travel_time.driving) {
                         travelHtml += `<span class="travel-badge">🚗 ${event.travel_time.driving}</span>`;
                    }
                    if (event.travel_time.walking) {
                         travelHtml += `<span class="travel-badge walk-badge">🚶 ${event.travel_time.walking}</span>`;
                    }
                }

                html += `
                    <div class="modal-map-container">
                        <div class="modal-map-header">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
                            Route
                            <div style="margin-left: auto; display: flex; gap: 0.5rem;">
                                ${travelHtml}
                            </div>
                        </div>
                        <iframe
                            class="modal-map-iframe"
                            loading="lazy"
                            allowfullscreen
                            referrerpolicy="no-referrer-when-downgrade"
                            src="https://www.google.com/maps/embed/v1/directions?key=${currentMapsApiKey}&origin=${encodedOrigin}&destination=${encodedDest}">
                        </iframe>
                    </div>
                `;
            }

            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('event-modal-overlay').classList.add('visible');
        }

        function closeEventModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('event-modal-overlay').classList.remove('visible');
        }

        // Fetch events every 10 seconds to reduce load
        setInterval(updateEvents, 10000);
        updateEvents(); // Initial fetch

        // Spotify API functions
        function prevSpotify() {
            fetch((window.API_ENDPOINT || "") + '/api/spotify/previous', { method: 'POST' })
                .then(() => setTimeout(updateSpotify, 500));
        }

        function skipSpotify() {
            fetch((window.API_ENDPOINT || "") + '/api/spotify/next', { method: 'POST' })
                .then(() => setTimeout(updateSpotify, 500));
        }

        function togglePlaySpotify() {
            fetch((window.API_ENDPOINT || "") + '/api/spotify/play_pause', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ device_id: localDeviceId })
            }).then(() => setTimeout(updateSpotify, 500));
        }

        function changeSpotifyVolume(val) {
            if (spotifyPlayer) {
                spotifyPlayer.setVolume(val / 100).then(() => {
                    console.log('Volume updated!');
                });
            }
            fetch((window.API_ENDPOINT || "") + '/api/spotify/volume', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ volume: parseInt(val) })
            });
        }

        // Spotify Polling
        let wasAuthRequired = false;

        function updateSpotifyUI(data) {
            const footer = document.getElementById('spotify-footer');
            const authContainer = document.getElementById('spotify-auth-container');
            const playContainer = document.getElementById('spotify-play-container');
            const fab = document.getElementById('spotify-fab');

            if (data.track) {
                isStartingPlayback = false;
                authContainer.style.display = 'none';
                playContainer.style.display = 'flex';
                document.getElementById('spotify-art').src = data.image;
                document.getElementById('spotify-track').textContent = data.track;
                document.getElementById('spotify-artist').textContent = data.artist;

                const slider = document.getElementById('spotify-volume');
                if (data.volume !== null && document.activeElement !== slider) {
                    slider.value = data.volume;
                }

                const playIcon = document.getElementById('play-pause-icon');
                if (playIcon) {
                    playIcon.innerHTML = data.is_playing ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>' : '<path d="M8 5v14l11-7z"/>';
                }

                footer.classList.add('visible');
                if (fab) fab.classList.add('hidden');
            } else {
                if (isStartingPlayback) {
                    authContainer.style.display = 'none';
                    playContainer.style.display = 'flex';
                    document.getElementById('spotify-track').textContent = 'Starte Wiedergabe...';
                    document.getElementById('spotify-artist').textContent = 'Bitte warten';
                    document.getElementById('spotify-art').src = 'https://www.scdn.co/i/_global/twitter_card-default.jpg';
                    footer.classList.add('visible');
                    if (fab) fab.classList.add('hidden');
                } else if (!footer.classList.contains('expanded')) {
                    footer.classList.remove('visible');
                    if (fab) fab.classList.remove('hidden');
                }
            }
        }

        function updateSpotify() {
            fetch((window.API_ENDPOINT || "") + '/api/spotify')
                .then(response => response.json())
                .then(data => {
                    if (data.auth_required) {
                        wasAuthRequired = true;
                        document.getElementById('spotify-auth-container').style.display = 'block';
                        document.getElementById('spotify-play-container').style.display = 'none';
                        document.getElementById('spotify-footer').classList.add('visible');
                        if (document.getElementById('spotify-fab')) document.getElementById('spotify-fab').classList.add('hidden');
                    } else {
                        if (wasAuthRequired) {
                            window.location.reload();
                            return;
                        }
                        updateSpotifyUI(data);
                    }
                })
                .catch(err => console.error('Spotify fetch error:', err));
        }

        // Modal Functions (now Panel Functions)
        function togglePlaylists() {
            const footer = document.getElementById('spotify-footer');
            const fab = document.getElementById('spotify-fab');
            const isExpanded = footer.classList.toggle('expanded');

            if (isExpanded) {
                footer.classList.add('visible');
                if (fab) fab.classList.add('hidden');
                searchPlaylists('');
            } else {
                // Trigger a refresh to decide if it should stay visible
                updateSpotify();
            }
        }

        // Backward compatibility
        function openPlaylistsModal() { togglePlaylists(); }
        function closePlaylistsModal() {
            document.getElementById('spotify-footer').classList.remove('expanded');
        }

        function searchPlaylists() {
            const query = document.getElementById('playlist-search').value;
            const grid = document.getElementById('playlists-grid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #94a3b8;">Lade...</div>';

            fetch((window.API_ENDPOINT || "") + '/api/spotify/playlists?q=' + encodeURIComponent(query))
                .then(res => res.json())
                .then(data => {
                    if (data.playlists && data.playlists.length > 0) {
                        grid.innerHTML = '';
                        data.playlists.forEach(pl => {
                            if (!pl) return;
                            const imgUrl = (pl.images && pl.images.length > 0) ? pl.images[0].url : 'https://via.placeholder.com/200';
                            const ownerName = pl.owner ? pl.owner.display_name : 'Unbekannt';
                            grid.innerHTML += `
                                <div class="playlist-card" onclick="playPlaylist('${pl.uri}')">
                                    <img src="${imgUrl}" alt="Cover" class="playlist-image">
                                    <div class="playlist-name">${pl.name}</div>
                                    <div class="playlist-owner">Von ${ownerName}</div>
                                </div>
                            `;
                        });
                    } else {
                        grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #94a3b8;">Keine Playlists gefunden.</div>';
                    }
                })
                .catch(err => {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #ef4444;">Fehler beim Laden.</div>';
                });
        }

        function playPlaylist(uri) {
            if (!localDeviceId) {
                alert('Spotify Web Player ist noch nicht bereit. Bitte warte einen Moment oder lade die Seite neu.');
                return;
            }

            isStartingPlayback = true;
            // Force footer to stay visible during start
            document.getElementById('spotify-footer').classList.add('visible');

            fetch((window.API_ENDPOINT || "") + '/api/spotify/play_playlist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ uri: uri, device_id: localDeviceId })
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        closePlaylistsModal();
                        // Longer timeout for the first update
                        setTimeout(updateSpotify, 2500);
                        // Safety reset after 10 seconds if still nothing
                        setTimeout(() => { isStartingPlayback = false; }, 10000);
                    } else {
                        isStartingPlayback = false;
                        alert('Fehler beim Abspielen: ' + data.error);
                    }
                });
        }

        // Check Spotify every 5 seconds
        setInterval(updateSpotify, 5000);
        updateSpotify();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(registration => {
                    console.log('ServiceWorker registration successful with scope: ', registration.scope);
                }, err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>

</html>
